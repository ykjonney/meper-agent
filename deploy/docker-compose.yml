# Agent Flow — Docker Compose (production / base configuration)
# For development, layer docker-compose.dev.yml on top:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev.yml up

services:
  caddy:
    image: ${CADDY_IMAGE:-deploy-caddy}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-deploy-backend}
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Container-internal paths (backend uses these to access files)
      - WORKSPACES_CONTAINER_DIR=${WORKSPACES_CONTAINER_DIR:-/data/workspaces}
      - SKILLS_CONTAINER_DIR=${SKILLS_CONTAINER_DIR:-/data/skills}
      # Host-side paths (passed to Docker daemon for sandbox bind mounts)
      - WORKSPACES_HOST_DIR=${WORKSPACES_HOST_DIR:-./data/workspaces}
      - SKILLS_HOST_DIR=${SKILLS_HOST_DIR:-./data/skills}
      # Sandbox
      - SANDBOX_ENABLED=${SANDBOX_ENABLED:-true}
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}

    volumes:
      # Docker socket — backend spawns sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Workspaces — shared between backend and sandbox containers
      - ${WORKSPACES_HOST_DIR:-./data/workspaces}:${WORKSPACES_CONTAINER_DIR:-/data/workspaces}
      # Skills — mounted read-only into sandbox containers
      - ${SKILLS_HOST_DIR:-./data/skills}:${SKILLS_CONTAINER_DIR:-/data/skills}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  celery-worker:
    image: ${BACKEND_IMAGE:-deploy-backend}  # 复用 backend 镜像
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - .env
    environment:
      - WORKSPACES_CONTAINER_DIR=${WORKSPACES_CONTAINER_DIR:-/data/workspaces}
      - SKILLS_CONTAINER_DIR=${SKILLS_CONTAINER_DIR:-/data/skills}
      - WORKSPACES_HOST_DIR=${WORKSPACES_HOST_DIR:-./data/workspaces}
      - SKILLS_HOST_DIR=${SKILLS_HOST_DIR:-./data/skills}
      - SANDBOX_ENABLED=${SANDBOX_ENABLED:-true}
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-agent-sandbox:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WORKSPACES_HOST_DIR:-./data/workspaces}:${WORKSPACES_CONTAINER_DIR:-/data/workspaces}
      - ${SKILLS_HOST_DIR:-./data/skills}:${SKILLS_CONTAINER_DIR:-/data/skills}
    depends_on:
      - redis
      - mongodb
    restart: unless-stopped

  mongodb:
    # Pin to 7.0 — existing data volumes were created with FCV 7.0 and
    # MongoDB 8.x refuses to start without an explicit upgrade procedure.
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-agentflow}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: agent_flow
    volumes:
      - ${MONGODB_DATA_DIR:-./data/mongodb}:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped

  # One-time init service: create admin user
  # Run with: docker compose run --rm create-admin
  create-admin:
    image: ${BACKEND_IMAGE:-deploy-backend}  # 复用 backend 镜像
    build:
      context: ../backend
      dockerfile: Dockerfile
    command:
      - "python"
      - "-m"
      - "app.cli"
      - "create-admin"
      - "--username"
      - "${ADMIN_USERNAME:-admin}"
      - "--password"
      - "${ADMIN_PASSWORD:-admin123}"
      - "--email"
      - "${ADMIN_EMAIL:-admin@example.com}"
    env_file:
      - .env
    depends_on:
      - mongodb
    profiles:
      - init

  # Sandbox image — built but not run as a service.
  # Build with: docker compose build sandbox
  sandbox:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.sandbox
    image: ${SANDBOX_IMAGE:-agent-sandbox:latest}
    profiles:
      - tools
