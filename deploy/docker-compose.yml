# Agent Flow — Docker Compose (production / base configuration)
# For development, layer docker-compose.dev.yml on top:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev.yml up

services:
  caddy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - .env
    depends_on:
      - redis
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-agentflow}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: agent_flow
    volumes:
      - ../deploy/data/mongodb:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ../deploy/data/redis:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped

  # One-time init service: create admin user
  # Run with: docker compose run --rm create-admin
  create-admin:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command:
      - "python"
      - "-m"
      - "app.cli"
      - "create-admin"
      - "--username"
      - "${ADMIN_USERNAME:-admin}"
      - "--password"
      - "${ADMIN_PASSWORD:-admin123}"
      - "--email"
      - "${ADMIN_EMAIL:-admin@example.com}"
    env_file:
      - .env
    depends_on:
      - mongodb
    profiles:
      - init
