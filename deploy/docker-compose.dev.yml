# Development overrides
# Usage: cd deploy && docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  frontend-studio:
    image: deploy-frontend-studio
    build:
      context: ../frontend-studio
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      VITE_API_TARGET: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  frontend-client:
    image: deploy-frontend-client
    build:
      context: ../frontend-client
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      APP_ENV: development
      DEBUG: "true"

  # Caddy is not needed in dev mode
  caddy:
    profiles:
      - dont-start-in-dev

  celery-worker:
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
