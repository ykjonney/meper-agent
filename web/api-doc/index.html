<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AgentPlat API · Documentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============ Design Tokens ============ */
:root[data-theme="dark"]{
  --bg: #07080d;
  --bg-grad-1: #0a0e1a;
  --bg-grad-2: #14182b;
  --blob-1: rgba(94,106,210,0.18);
  --blob-2: rgba(52,211,153,0.10);
  --surface: rgba(255,255,255,0.035);
  --surface-2: rgba(255,255,255,0.06);
  --surface-3: rgba(255,255,255,0.09);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.16);
  --text: #EDEDEF;
  --text-muted: #9aa0ac;
  --text-dim: #626773;
  --accent: #5E6AD2;
  --accent-2: #7c89ff;
  --accent-glow: rgba(94,106,210,0.30);
  --code-bg: rgba(0,0,0,0.35);
  --code-border: rgba(255,255,255,0.08);
  --shadow: 0 10px 40px -12px rgba(0,0,0,0.6);
  --m-GET:#34d399; --m-POST:#60a5fa; --m-PUT:#fbbf24; --m-PATCH:#c084fc; --m-DELETE:#f87171;
  --tok-k:#7c89ff; --tok-s:#34d399; --tok-n:#fbbf24; --tok-b:#c084fc; --tok-p:#9aa0ac;
}
:root[data-theme="light"]{
  --bg: #f7f8fa;
  --bg-grad-1: #ffffff;
  --bg-grad-2: #eef0f6;
  --blob-1: rgba(94,106,210,0.12);
  --blob-2: rgba(52,211,153,0.10);
  --surface: #ffffff;
  --surface-2: #f4f5f8;
  --surface-3: #eceef3;
  --surface-hover: #f0f2f7;
  --border: #e6e8ee;
  --border-strong: #d0d4dd;
  --text: #16181d;
  --text-muted: #555b66;
  --text-dim: #8a909c;
  --accent: #5E6AD2;
  --accent-2: #4c56b8;
  --accent-glow: rgba(94,106,210,0.18);
  --code-bg: #1a1d2b;
  --code-border: #2a2e3e;
  --shadow: 0 6px 24px -10px rgba(20,24,43,0.18);
  --m-GET:#0a8f63; --m-POST:#2563eb; --m-PUT:#b45309; --m-PATCH:#7c3aed; --m-DELETE:#dc2626;
  --tok-k:#7c89ff; --tok-s:#4ade80; --tok-n:#fbbf24; --tok-b:#c084fc; --tok-p:#9aa0ac;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  transition:background .4s ease,color .3s ease;
  min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(900px 600px at 12% -5%, var(--blob-1), transparent 60%),
    radial-gradient(800px 500px at 95% 8%, var(--blob-2), transparent 55%),
    linear-gradient(180deg, var(--bg-grad-1), var(--bg-grad-2));
  transition:opacity .4s ease;
}
::selection{background:var(--accent-glow);color:var(--text)}
a{color:inherit;text-decoration:none}

/* ============ Topbar ============ */
.topbar{
  position:sticky;top:0;z-index:50;
  height:60px;display:flex;align-items:center;gap:20px;
  padding:0 22px;
  background:color-mix(in srgb, var(--bg) 72%, transparent);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;letter-spacing:-.02em;white-space:nowrap}
.brand-mark{
  width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  box-shadow:0 4px 14px var(--accent-glow);
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:#fff;
}
.brand b{font-size:16px}
.brand .ver{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--text-dim);
  border:1px solid var(--border);padding:2px 7px;border-radius:6px;margin-left:2px}
.search-wrap{flex:1;max-width:480px;position:relative}
.search{
  width:100%;height:38px;border-radius:10px;
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);padding:0 14px 0 38px;font-size:14px;font-family:inherit;
  transition:border-color .2s, background .2s;
}
.search:focus{outline:none;border-color:var(--accent);background:var(--surface-3)}
.search::placeholder{color:var(--text-dim)}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
.search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);
  border:1px solid var(--border);border-radius:5px;padding:1px 6px;background:var(--surface)}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.baseurl{
  font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);
  background:var(--surface-2);border:1px solid var(--border);padding:6px 11px;border-radius:8px;white-space:nowrap;
}
.baseurl b{color:var(--accent-2);font-weight:600}
.icon-btn{
  width:38px;height:38px;border-radius:10px;display:grid;place-items:center;cursor:pointer;
  background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);
  transition:all .2s;
}
.icon-btn:hover{background:var(--surface-3);color:var(--text);border-color:var(--border-strong)}
.menu-btn{display:none}

/* ============ Layout ============ */
.layout{display:flex;align-items:flex-start}
.sidebar{
  width:286px;flex-shrink:0;position:sticky;top:60px;
  height:calc(100vh - 60px);overflow-y:auto;
  padding:18px 12px 40px;
  border-right:1px solid var(--border);
}
.sidebar::-webkit-scrollbar{width:8px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.main{flex:1;min-width:0;padding:32px 44px 120px;max-width:1000px;margin:0 auto}

/* ============ Sidebar nav ============ */
.nav-module{margin-bottom:6px}
.nav-mod-head{
  display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;
  padding:8px 10px;border-radius:8px;font-size:11px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);
  transition:background .15s;
}
.nav-mod-head:hover{background:var(--surface)}
.nav-mod-head .mod-ico{width:15px;height:15px;color:var(--accent-2);flex-shrink:0}
.nav-mod-head .chev{margin-left:auto;width:13px;height:13px;color:var(--text-dim);transition:transform .2s}
.nav-module.collapsed .chev{transform:rotate(-90deg)}
.nav-mod-head .mod-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);
  background:var(--surface-2);padding:1px 6px;border-radius:5px;font-weight:500;letter-spacing:0}
.nav-resources{overflow:hidden;max-height:2000px;transition:max-height .3s ease}
.nav-module.collapsed .nav-resources{max-height:0}
.nav-res{padding:2px 0 2px 10px}
.nav-res-label{font-size:11px;color:var(--text-dim);padding:6px 10px 3px;font-weight:500;letter-spacing:.02em}
.nav-ep{
  display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:7px;cursor:pointer;
  font-size:13px;color:var(--text-muted);transition:all .15s;line-height:1.35;
}
.nav-ep:hover{background:var(--surface);color:var(--text)}
.nav-ep.active{background:var(--accent-glow);color:var(--text)}
.nav-ep.active .ep-path{font-weight:600}
.ep-method{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600;
  padding:2px 0;width:42px;text-align:center;border-radius:4px;flex-shrink:0;letter-spacing:.02em;
  background:color-mix(in srgb, var(--mc) 16%, transparent);
  color:var(--mc);
}
.ep-path{font-family:'JetBrains Mono',monospace;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-ep.hidden{display:none}

/* ============ Main content ============ */
.crumbs{font-size:12px;color:var(--text-dim);margin-bottom:14px;font-family:'JetBrains Mono',monospace}
.crumbs span{color:var(--text-muted)}
.crumbs .sep{margin:0 7px;color:var(--text-dim)}

.ep-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:8px}
.method-badge{
  font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;
  padding:6px 13px;border-radius:8px;height:fit-content;
  background:color-mix(in srgb, var(--mc) 16%, transparent);
  color:var(--mc);border:1px solid color-mix(in srgb, var(--mc) 30%, transparent);
  letter-spacing:.03em;
}
.ep-path-title{
  font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;letter-spacing:-.01em;
  word-break:break-all;line-height:1.3;
}
.ep-title-zh{font-size:19px;font-weight:600;color:var(--text);letter-spacing:-.01em;margin:6px 0 0}
.ep-desc{color:var(--text-muted);font-size:14.5px;margin:14px 0 0;max-width:680px}

.section{margin-top:34px}
.section-h{
  display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;
  letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);
  margin-bottom:13px;padding-bottom:10px;border-bottom:1px solid var(--border);
}
.section-h .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* param table */
.param-table{width:100%;border-collapse:collapse;font-size:13.5px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.param-table th,.param-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}
.param-table tr:last-child td{border-bottom:none}
.param-table th{background:var(--surface-2);font-weight:600;font-size:12px;color:var(--text-muted);letter-spacing:.02em}
.p-name{font-family:'JetBrains Mono',monospace;color:var(--text);font-weight:500;white-space:nowrap}
.p-type{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent-2)}
.p-req{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.p-req.yes{background:color-mix(in srgb,#f87171 16%,transparent);color:#f87171}
:root[data-theme="light"] .p-req.yes{color:#dc2626}
.p-req.no{background:var(--surface-3);color:var(--text-dim)}
.p-desc{color:var(--text-muted)}
.p-desc code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface-3);padding:1px 5px;border-radius:4px;color:var(--accent-2)}

/* code block */
.code-block{
  position:relative;border-radius:12px;overflow:hidden;
  background:var(--code-bg);border:1px solid var(--code-border);margin-top:4px;
}
.code-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;border-bottom:1px solid var(--code-border);
  background:color-mix(in srgb,var(--code-bg) 60%, #fff 4%);
}
.code-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8a909c;letter-spacing:.05em;text-transform:uppercase}
.code-status{font-family:'JetBrains Mono',monospace;font-size:11px;color:#4ade80;font-weight:600}
.copy-btn{
  display:flex;align-items:center;gap:5px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:#9aa0ac;
  background:transparent;border:1px solid rgba(255,255,255,.12);padding:4px 9px;border-radius:6px;
  transition:all .15s;
}
.copy-btn:hover{color:#fff;border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.06)}
.copy-btn.copied{color:#4ade80;border-color:rgba(74,222,128,.4)}
pre{margin:0;padding:15px 16px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.65;color:#dfe3ec}
pre::-webkit-scrollbar{height:8px}
pre::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
.tok-k{color:var(--tok-k)} .tok-s{color:var(--tok-s)} .tok-n{color:var(--tok-n)} .tok-b{color:var(--tok-b)} .tok-p{color:var(--tok-p)}

.note{
  font-size:13px;color:var(--text-muted);background:color-mix(in srgb,var(--accent) 8%,transparent);
  border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);border-radius:9px;
  padding:10px 14px;margin-top:12px;
}
.note b{color:var(--accent-2)}

/* error list */
.err-list{display:flex;flex-direction:column;gap:8px}
.err-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:9px;background:var(--surface);font-size:13px}
.err-code{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#f87171;background:color-mix(in srgb,#f87171 12%,transparent);padding:3px 9px;border-radius:6px;white-space:nowrap}
:root[data-theme="light"] .err-code{color:#dc2626}
.err-http{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);min-width:34px}
.err-msg{color:var(--text-muted)}

/* response transition diagram */
.trans-diagram{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.9;color:var(--text-muted);
  background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;white-space:pre;overflow-x:auto}
.trans-diagram .st{color:var(--accent-2)}

/* ============ Overview ============ */
.hero{margin-bottom:36px}
.hero h1{font-size:34px;font-weight:700;letter-spacing:-.025em;margin:0 0 10px;line-height:1.15}
.hero h1 .grad{background:linear-gradient(120deg,var(--accent-2),#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{font-size:16px;color:var(--text-muted);max-width:620px;margin:0}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:28px 0}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;
  transition:all .2s;
}
.stat-card:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:600;letter-spacing:-.02em;background:linear-gradient(120deg,var(--text),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:3px;letter-spacing:.02em}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:8px;font-family:'JetBrains Mono',monospace}

.module-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:14px}
.mod-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.mod-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.mod-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-glow),transparent 50%);opacity:0;transition:opacity .25s}
.mod-card:hover::before{opacity:1}
.mod-card > *{position:relative}
.mod-ico-lg{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent-2);margin-bottom:12px}
.mod-card h3{margin:0 0 4px;font-size:15px;font-weight:600}
.mod-card .mc-en{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:.03em}
.mod-card .mc-desc{font-size:13px;color:var(--text-muted);margin:10px 0 12px;line-height:1.5}
.mod-card .mc-meta{display:flex;gap:6px;flex-wrap:wrap}
.mc-tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-muted);background:var(--surface-2);border:1px solid var(--border);padding:2px 8px;border-radius:5px}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.info-card h3{margin:0 0 14px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.info-card h3 .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}

.empty{text-align:center;padding:80px 20px;color:var(--text-dim)}
.empty-ico{font-size:36px;margin-bottom:12px;opacity:.5}

/* ============ mobile ============ */
.sidebar-backdrop{display:none}
@media(max-width:980px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .baseurl{display:none}
}
@media(max-width:768px){
  .main{padding:22px 18px 100px}
  .search-wrap{max-width:none}
  .menu-btn{display:grid}
  .sidebar{
    position:fixed;top:60px;left:0;z-index:40;width:300px;
    transform:translateX(-105%);transition:transform .28s cubic-bezier(.16,1,.3,1);
    background:var(--bg);box-shadow:var(--shadow);
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop{display:block;position:fixed;inset:60px 0 0;background:rgba(0,0,0,.5);z-index:35;opacity:0;pointer-events:none;transition:opacity .25s}
  .sidebar-backdrop.show{opacity:1;pointer-events:auto}
  .hero h1{font-size:27px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header class="topbar">
  <button class="icon-btn menu-btn" id="menuBtn" aria-label="菜单">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="brand">
    <div class="brand-mark">A</div>
    <b>AgentPlat API</b>
    <span class="ver">v1</span>
  </div>
  <div class="search-wrap">
    <svg class="search-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search" id="search" placeholder="搜索端点、路径、关键词…" autocomplete="off" />
    <span class="search-kbd">/</span>
  </div>
  <div class="topbar-right">
    <div class="baseurl"><b>POST</b> http://localhost:3000<b>/api/v1</b></div>
    <button class="icon-btn" id="themeBtn" aria-label="切换主题" title="切换主题">
      <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"></svg>
    </button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-backdrop" id="backdrop"></div>
  <main class="main" id="main"></main>
</div>

<script>
/* ============ API Data ============ */
const MODULES = [
  { id:'smart', name:'Smart Foundation', nameZh:'智能基础', count:14,
    desc:'Agent 与 Chat 对话智能体核心', res:['Agent','Chat'],
    icon:'<path d="M12 2a4 4 0 0 1 4 4v1h1a4 4 0 0 1 4 4 4 4 0 0 1-4 4h-1v1a4 4 0 0 1-8 0v-1H7a4 4 0 0 1-4-4 4 4 0 0 1 4-4h1V6a4 4 0 0 1 4-4z"/><circle cx="9" cy="11" r="1"/><circle cx="15" cy="11" r="1"/>' },
  { id:'ext', name:'Extension Capabilities', nameZh:'扩展能力', count:12,
    desc:'Skill 技能与 MCP Server 外部工具', res:['Skill','MCP'],
    icon:'<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>' },
  { id:'wf', name:'Workflow Engine', nameZh:'工作流引擎', count:17,
    desc:'PresetNode → Flow → Task 三层流水线', res:['PresetNode','Flow','Task'],
    icon:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M10 6.5h4M17.5 10v4M14 17.5h-4"/>' },

const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function hlJson(obj){
  let j = JSON.stringify(obj, null, 2);
  j = esc(j);
  // keys (string followed by colon)
  j = j.replace(/("(?:\\.|[^"\\])*")(\s*:)/g, '<span class="tok-k">$1</span>$2');
  // string values (after colon)
  j = j.replace(/(:\s*)("(?:\\.|[^"\\])*")/g, '$1<span class="tok-s">$2</span>');
  // string items in arrays (after [ or ,) — skip ones already wrapped
  j = j.replace(/([\[,]\s*)("(?:\\.|[^"\\])*")(?!\s*<)/g, '$1<span class="tok-s">$2</span>');
  // numbers / booleans / null — anchored to value position (: or [ or ,) so digits inside strings are never touched
  j = j.replace(/(:\s*|[\[,]\s*)(-?\d+\.?\d*(?:e[+-]?\d+)?|true|false|null)\b/gi, (m, p1, p2) => {
    const cls = /^(true|false|null)$/i.test(p2) ? 'tok-b' : 'tok-n';
    return `${p1}<span class="${cls}">${p2}</span>`;
  });
  return j;
}
function curlBlock(ep){
  const code = esc(ep.c || `curl -X ${ep.m} "http://localhost:3000/api/v1${ep.p}" \\\n  -H "Authorization: Bearer <token>"`);
  return `<div class="code-block"><div class="code-head"><span class="code-label">cURL · Bash</span><button class="copy-btn" data-copy="${encodeURIComponent(ep.c || '')}">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Copy</button></div><pre>${code}</pre></div>`;
}
function jsonBlock(label, obj, status){
  return `<div class="code-block"><div class="code-head"><span class="code-label">${label}</span>${status?`<span class="code-status">${status}</span>`:''}</div><pre>${hlJson(obj)}</pre></div>`;
}
function paramTable(rows){
  return `<table class="param-table"><thead><tr><th>参数</th><th>类型</th><th>必填</th><th>说明</th></tr></thead><tbody>
    ${rows.map(p=>`<tr><td class="p-name">${p.n}</td><td class="p-type">${p.ty}</td><td><span class="p-req ${p.req?'yes':'no'}">${p.req?'Yes':'No'}</span></td><td class="p-desc">${p.d}</td></tr>`).join('')}
  </tbody></table>`;
}
function errList(errs){
  return `<div class="err-list">${errs.map(e=>`<div class="err-item"><span class="err-code">${e.code}</span><span class="err-http">${e.http}</span><span class="err-msg">${e.msg}</span></div>`).join('')}</div>`;
}

function renderSidebar(){
  const sb = $('#sidebar');
  let html = '';
  MODULES.forEach(mod=>{
    const eps = EP.filter(e=>e.mod===mod.id);
    html += `<div class="nav-module" data-mod="${mod.id}">
      <div class="nav-mod-head"><svg class="mod-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${mod.icon}</svg>
      <span>${mod.nameZh}</span><span class="mod-count">${eps.length}</span>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></div>
      <div class="nav-resources">`;
    let curRes = '';
    eps.forEach((ep,i)=>{
      const idx = EP.indexOf(ep);
      if(ep.res!==curRes){ curRes=ep.res; html += `<div class="nav-res-label">${ep.res}</div>`; }
      html += `<div class="nav-ep m-${ep.m}" data-idx="${idx}">
        <span class="ep-method">${ep.m}</span><span class="ep-path">${ep.p}</span></div>`;
    });
    html += `</div></div>`;
  });
  sb.innerHTML = html;

  sb.querySelectorAll('.nav-mod-head').forEach(h=>{
    h.addEventListener('click',()=>h.parentElement.classList.toggle('collapsed'));
  });
  sb.querySelectorAll('.nav-ep').forEach(el=>{
    el.addEventListener('click',()=>{
      location.hash = '#ep-' + el.dataset.idx;
      closeMobileNav();
    });
  });
}

function renderEndpoint(idx){
  const ep = EP[idx];
  const mod = MODULES.find(m=>m.id===ep.mod);
  let html = `<div class="crumbs">${mod.nameZh}<span class="sep">/</span><span>${ep.res}</span><span class="sep">/</span>${ep.t}</div>`;
  html += `<div class="ep-head"><span class="method-badge m-${ep.m}">${ep.m}</span>
    <div><div class="ep-path-title">${ep.p}</div></div></div>`;
  html += `<div class="ep-title-zh">${ep.t}</div>`;
  html += `<p class="ep-desc">${ep.d}</p>`;

  if(ep.pp){ html += `<section class="section"><div class="section-h"><span class="dot"></span>Path Parameters</div>${paramTable(ep.pp)}</section>`; }
  if(ep.q){ html += `<section class="section"><div class="section-h"><span class="dot"></span>Query Parameters</div>${paramTable(ep.q)}</section>`; }
  if(ep.b){ html += `<section class="section"><div class="section-h"><span class="dot"></span>Request Body</div>${jsonBlock('JSON', ep.b)}</section>`; }
  if(ep.r){ html += `<section class="section"><div class="section-h"><span class="dot"></span>Response</div>${jsonBlock('JSON', ep.r, 'code '+ep.r.code)}</section>`; }
  if(ep.diagram){ html += `<section class="section"><div class="section-h"><span class="dot"></span>状态转换图</div><div class="trans-diagram">${ep.diagram}</div></section>`; }
  html += `<section class="section"><div class="section-h"><span class="dot"></span>cURL 示例</div>${curlBlock(ep)}</section>`;
  if(ep.note){ html += `<div class="note">${ep.note}</div>`; }
  if(ep.e){ html += `<section class="section"><div class="section-h"><span class="dot"></span>错误响应</div>${errList(ep.e)}</section>`; }

  $('#main').innerHTML = html;
  $('#main').scrollTo(0,0);
  bindCopy();
  document.querySelectorAll('.nav-ep').forEach(el=>el.classList.toggle('active', +el.dataset.idx===idx));
}

  document.querySelectorAll('.mod-card').forEach(c=>{
    c.addEventListener('click',()=>{
      const firstEp = EP.findIndex(e=>e.mod===c.dataset.goMod);
      if(firstEp>=0){ location.hash='#ep-'+firstEp; }
    });
  });
}

function bindCopy(){
  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.onclick=()=>{
      const txt = decodeURIComponent(btn.dataset.copy);
      navigator.clipboard.writeText(txt).then(()=>{
        btn.classList.add('copied');
        btn.querySelector('svg').outerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
        const lbl = btn.childNodes[btn.childNodes.length-1];
        if(lbl && lbl.nodeType===3) lbl.textContent=' Copied';
        setTimeout(()=>{
          btn.classList.remove('copied');
          btn.querySelector('svg').outerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
          if(lbl && lbl.nodeType===3) lbl.textContent=' Copy';
        },1600);
      });
    };
  });
}

/* ============ Search ============ */
function applySearch(q){
  q = q.trim().toLowerCase();
  document.querySelectorAll('.nav-ep').forEach(el=>{
    const idx=+el.dataset.idx, ep=EP[idx];
    const hay = (ep.m+' '+ep.p+' '+ep.t+' '+ep.res+' '+ep.d).toLowerCase();
    el.classList.toggle('hidden', q && !hay.includes(q));
  });
  // expand all modules when searching
  document.querySelectorAll('.nav-module').forEach(m=>{
    if(q) m.classList.remove('collapsed');
  });
}

/* ============ Theme ============ */
const SUN='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
const MOON='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  $('#themeIcon').innerHTML = t==='dark'?MOON:SUN;
  localStorage.setItem('apitheme', t);
}
function initTheme(){
  const saved = localStorage.getItem('apitheme');
  const sys = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  setTheme(saved || sys);
}

/* ============ Mobile nav ============ */
function closeMobileNav(){ $('#sidebar').classList.remove('open'); $('#backdrop').classList.remove('show'); }

/* ============ Router ============ */
function route(){
  const h = location.hash;
  const m = h.match(/^#ep-(\d+)$/);
  if(m && EP[+m[1]]){ renderEndpoint(+m[1]); }
  else{ renderOverview(); }
  window.scrollTo(0,0);
}

/* ============ Init ============ */
renderSidebar();
initTheme();
route();
$('#themeBtn').addEventListener('click',()=>{
  const cur = document.documentElement.getAttribute('data-theme');
  setTheme(cur==='dark'?'light':'dark');
});
$('#search').addEventListener('input', e=>applySearch(e.target.value));
window.addEventListener('hashchange', route);
$('#menuBtn').addEventListener('click',()=>{ $('#sidebar').classList.add('open'); $('#backdrop').classList.add('show'); });
$('#backdrop').addEventListener('click', closeMobileNav);
document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement!==$('#search')){ e.preventDefault(); $('#search').focus(); }
  if(e.key==='Escape'){ $('#search').value=''; applySearch(''); $('#search').blur(); }
});
</script>
</body>
</html>
