# CI Pipeline — runs on every PR to main, and on push to main/dev
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + type + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy app

      - name: Test (pytest)
        run: uv run pytest -q -m "not integration"

  frontend:
    name: Frontend (lint + type-check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run type-check

      - name: Test (vitest)
        run: npm run test

  harness:
    name: Harness (lint + type + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/packages/harness

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      # Install against harness's own lockfile → a clean venv without app-layer
      # deps, so guards like test_no_app_layer_imports_leak stay meaningful.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest -q
