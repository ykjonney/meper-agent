# CD workflow - 自动部署到阿里云
name: Deploy to Aliyun

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to Aliyun ECS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Aliyun ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_ECS_HOST }}
          username: ${{ secrets.ALIYUN_ECS_USERNAME }}
          key: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
          port: ${{ secrets.ALIYUN_ECS_PORT || 22 }}
          script: |
            set -e

            # 进入项目目录
            cd ${{ secrets.DEPLOY_PATH || '/opt/agent-flow' }}

            # 拉取最新代码（确保 docker-compose.yml 等配置文件是最新的）
            echo "📥 Pulling latest code..."
            git pull origin main

            # 进入 deploy 目录（.env 文件所在目录，docker compose 从当前目录读取 .env）
            cd deploy

            # 登录阿里云容器镜像服务
            echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login -u "${{ secrets.ALIYUN_ACR_USERNAME }}" --password-stdin ${{ secrets.ALIYUN_REGISTRY }}

            # 拉取最新镜像
            echo "📥 Pulling latest images..."
            docker compose pull

            # 停止旧服务（保留数据卷）
            echo "🛑 Stopping old services..."
            docker compose down || true

            # 启动新服务
            echo "🚀 Starting new services..."
            docker compose up -d

            # 等待服务启动
            echo "⏳ Waiting for services to start..."
            sleep 10

            # 清理未使用的镜像
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            # 显示服务状态
            echo "✅ Deployment complete!"
            docker compose ps

      - name: Health Check
        run: |
          echo "🔍 Performing health checks..."
          sleep 20

          # 检查后端健康
          echo "Checking backend health..."
          curl -f http://${{ secrets.ALIYUN_ECS_HOST }}:8000/health || exit 1

          # 检查前端
          echo "Checking frontend..."
          curl -f http://${{ secrets.ALIYUN_ECS_HOST }} || exit 1

          echo "✅ All health checks passed!"
