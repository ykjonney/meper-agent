[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-flow-harness"
version = "0.1.0"
description = "Reusable LangGraph agent harness extracted from agent-flow backend."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
  { name = "agent-flow team" },
]
dependencies = [
  "langgraph>=1.0.8",
  "langchain-core>=1.4.1",
  "langchain-anthropic>=1.4.4",
  "langchain-openai>=1.2.2",
  "pydantic>=2.0",
  "structlog>=24.1.0",
  "typing-extensions",
]

[project.optional-dependencies]
dev = [
  "pytest>=9.0",
  "pytest-asyncio>=1.0",
  "mypy>=1.13",
  "ruff>=0.8",
  "httpx>=0.28",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agent_flow_harness"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --strict-markers"
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_return_any = true

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "mypy>=2.1.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "ruff>=0.15.19",
]
